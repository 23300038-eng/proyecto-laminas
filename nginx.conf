events {
    worker_connections 1024;
}

http {
    upstream php {
        # Usamos socket Unix (más estable y rápido en un solo contenedor)
        server unix:/var/run/php-fpm.sock;
    }

    server {
        listen 80 default_server;
        server_name _;

        # ← Muy importante para Laminas
        root /var/www/html/public;
        index index.php;

        # Archivos estáticos
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Procesamiento de PHP
        location ~ \.php$ {
            fastcgi_pass php;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;

            # Para ver errores de PHP mientras debugueas
            fastcgi_param PHP_VALUE "display_errors=On\nerror_reporting=E_ALL";
        }

        # Seguridad
        location ~ /\.ht {
            deny all;
        }
    }
}